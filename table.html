<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <link rel="stylesheet" href="table.css">
    <style>
        table{
            border-collapse: collapse;
        }
    td,th{
            border: 1px solid;
            padding: 10px 20px;

        }

</head>

        </tr>
         <tr>
           <td>saif</td>

        </tr>
         <tr>
           <td>saif</td>

        </tr>
    </tbody>

    </table>
</body>
</html>
